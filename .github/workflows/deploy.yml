name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo 'FROM curio-base
          COPY --from=public.ecr.aws/awsguru/aws-lambda-adapter:1.0.0-rc1 /lambda-adapter /opt/extensions/lambda-adapter' > Dockerfile.lambda
          docker build -t curio-base .
          docker build -f Dockerfile.lambda -t $REGISTRY/curio:$IMAGE_TAG -t $REGISTRY/curio:latest .
          docker push $REGISTRY/curio:$IMAGE_TAG
          docker push $REGISTRY/curio:latest

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Deploy CDK stack
        working-directory: infra
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          npm ci
          npx cdk deploy --all --require-approval never
